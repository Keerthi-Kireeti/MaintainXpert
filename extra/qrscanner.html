<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Machine Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../dark-mode.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#1e40af',
            accent: '#3b82f6',
            danger: '#ef4444',
            warning: '#f59e0b',
            success: '#10b981'
          }
        }
      }
    }
  </script>
  <style>
    .issue-card {
      transition: all 0.3s ease;
    }
    .issue-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    #reader {
      min-height: 300px;
      background-color: #f3f4f6;
    }
    .scanner-active {
      border: 4px solid #2563eb;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { border-color: #2563eb; }
      50% { border-color: #93c5fd; }
    }
    #loading {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <!-- Header -->
  <header class="bg-primary text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fas fa-qrcode text-2xl"></i>
        <h1 class="text-2xl font-bold">Machine QR Scanner</h1>
      </div>
      <button onclick="rescanQR()" class="bg-white text-primary px-4 py-2 rounded-lg hover:bg-gray-100 transition">
        <i class="fas fa-redo mr-2"></i> Rescan
      </button>
    </div>
  </header>

  <!-- Main Body -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- QR Scanner -->
      <div class="col-span-1 bg-white p-6 rounded-xl shadow border border-gray-200">
        <h2 class="text-lg font-semibold text-gray-800 mb-2">Scanner</h2>
        <p class="text-sm text-gray-500 mb-4">Scan machine QR code to view details and report issues.</p>
        <div id="reader" class="rounded-lg border border-gray-300 scanner-active"></div>
        <div class="flex space-x-2 mt-4">
          <button id="toggleCamera" class="bg-primary text-white px-3 py-2 rounded hover:bg-secondary transition text-sm flex items-center">
            <i class="fas fa-sync-alt mr-1"></i> Switch Camera
          </button>
          <button id="flashToggle" class="bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700 transition text-sm flex items-center">
            <i class="fas fa-lightbulb mr-1"></i> Flashlight
          </button>
        </div>
      </div>

      <!-- Machine Details & Issue Reporting -->
      <div class="col-span-2">
        <!-- Result Area -->
        <div id="result" class="hidden">
          <!-- Content dynamically filled by JS -->
        </div>

        <!-- No Scan Prompt -->
        <div id="noScan" class="bg-blue-50 border border-blue-200 rounded-lg text-center p-10">
          <i class="fas fa-qrcode text-blue-400 text-5xl mb-4"></i>
          <h3 class="text-xl font-semibold text-blue-800 mb-2">Ready to Scan</h3>
          <p class="text-gray-600">Please scan a machine QR code to continue.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Script Integration -->
  <script src="machine.js"></script>
  <script>
    // Theme toggle functionality with localStorage persistence
    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else if (theme === 'light') {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        // System preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('theme', 'system');
      }
    }

    // Apply saved theme on page load
    document.addEventListener('DOMContentLoaded', function() {
      const savedTheme = localStorage.getItem('theme') || 'system';
      setTheme(savedTheme);
    });
  </script>
</body>
</html>
